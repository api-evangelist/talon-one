description: >-
  FinOps view of Talon.One spend. Talon.One is an enterprise SaaS promotion and
  loyalty platform billed through a negotiated subscription rather than public
  usage-based API pricing. The dominant cost driver is the contracted data volume
  (transaction / session volume used to run promotions) tied to the package level
  (Starter, Professional, Enterprise), plus one-time implementation and
  professional-services costs and any premium support. Integration and Management
  API usage is included in the subscription; there is no separate public per-call
  API charge. Because each account runs as a per-customer deployment, cost is
  primarily a fixed/committed contract with a volume band, not a metered pay-per-request
  invoice.
notes: >-
  Talon.One does not publish official per-unit rates; entry cost is reported by
  third parties on the order of ~EUR 1,500/month plus implementation, but must be
  confirmed with Talon.One. Model spend as a committed annual subscription plus
  implementation/services, and track internal promotion volume against the
  contracted band to anticipate tier upgrades.

meters:
- name: promotion_data_volume
  description: Transaction / customer-session volume used to run promotions, the primary contracted cost driver by package band.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - application
- name: subscription
  description: Committed platform subscription for the contracted package (Starter, Professional, Enterprise).
  unit: contract
  aggregation: sum
  dimensions:
  - account
- name: implementation_services
  description: One-time implementation, onboarding, and professional-services cost.
  unit: engagement
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track promotion/session volume per Application against the contracted data-volume band to see how close usage is to the next tier.
- name: Allocation
  description: Map Applications and campaigns to business units so promotion volume and platform cost attribute to the right cost centers.
- name: Optimization
  description: Consolidate low-value campaigns, retire unused Applications, and use asynchronous bulk endpoints to stay within contracted volume efficiently.
- name: Accountability
  description: Assign owners per Application/campaign and review promotion volume against the subscription band ahead of renewal and tier negotiations.

aid: talon-one
url: https://raw.githubusercontent.com/api-evangelist/talon-one/refs/heads/main/apis.yml
name: Talon.One
kind: company
description: Talon.One is an enterprise promotion, loyalty, and incentives engine
  that lets teams build and run coupons, discounts, referrals, bundles, giveaways,
  and multi-tier loyalty programs from a single rules-based platform. It exposes two
  primary REST APIs. The Integration API pushes real-time customer sessions, profiles,
  and events into the rules engine and returns the effects (discounts, awarded
  loyalty points, accepted coupons) to apply in the calling application. The
  Management API programmatically administers applications, campaigns, rulesets,
  coupons, loyalty programs, audiences, custom attributes, collections, and
  analytics exports that back the Campaign Manager. Talon.One is delivered as a
  managed, per-customer deployment; each account calls its own base URL
  (https://yourbaseurl.talon.one) and authenticates with an API key whose prefix
  distinguishes the Integration key (ApiKey-v1) from the Management key
  (ManagementKey-v1).

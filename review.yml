    - url: https://github.com/talon-one/TalonOnePHPsdk/blob/master/docs/Api/ManagementApi.md
      type: SourceCode
      note: SDK doc enumerating Management API operations and paths (v1).
    - url: https://www.talon.one/pricing
      type: Pricing
      note: Custom, contact-sales pricing across Starter, Professional, and Enterprise packages; data-volume based.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Talon.One's own public API is
    request/response REST across the Integration API (inline real-time session
    and event evaluation) and the Management API (administration and exports).
    No AsyncAPI document was created because there is no server-push transport on
    Talon.One's own API to model; outbound delivery is via configured webhooks,
    which are server-to-endpoint HTTP rather than a client-facing WebSocket.

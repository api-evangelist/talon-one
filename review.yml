      type: APIReference
      note: Integration API reference - real-time customer sessions, profiles, events, coupons, loyalty. All REST; no WebSocket.
    - url: https://docs.talon.one/management-api
      type: APIReference
      note: Management API reference - applications, campaigns, coupons, loyalty, audiences, exports. All REST.
    - url: https://www.talon.one/api-documentation
